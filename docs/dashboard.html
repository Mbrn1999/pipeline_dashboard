        async function deleteAnnotation(id) {
            try {
                const { error } = await window.supabaseClient
                    .from('agenda_events')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                console.log('✓ Annotation supprimée');
                await loadAnnotations();

        async function saveAnnotation() {
            const type = document.getElementById('annotationType').value;
            const text = document.getElementById('annotationText').value.trim();
            
            if (!text) {
                alert('Veuillez saisir un texte');
                return;
            }

            let annotationData = {
                user_id: window.currentUserId,
                event_type: type,
                title: text
            };

            if (type === 'period') {
                const startDate = document.getElementById('annotationStartDate').value;
                const endDate = document.getElementById('annotationEndDate').value;
                if (!startDate || !endDate) {
                    alert('Veuillez sélectionner les dates de début et de fin');
                    return;
                }
                if (endDate < startDate) {
                    alert('La date de fin doit être après la date de début');
                    return;
                }
                annotationData.start_datetime = startDate + 'T00:00:00';
                annotationData.end_datetime = endDate + 'T23:59:59';
                annotationData.all_day = true;
            } else if (type === 'day') {
                const date = document.getElementById('annotationStartDate').value;
                if (!date) {
                    alert('Veuillez sélectionner une date');
                    return;
                }
                annotationData.start_datetime = date + 'T00:00:00';
                annotationData.end_datetime = date + 'T23:59:59';
                annotationData.all_day = true;
            } else if (type === 'time') {
                const date = document.getElementById('annotationStartDate').value;
                const time = document.getElementById('annotationTime').value;
                if (!date || !time) {
                    alert('Veuillez sélectionner une date et une heure');
                    return;
                }
                annotationData.start_datetime = `${date}T${time}:00`;
                const endObj = new Date(`${date}T${time}:00`);
                endObj.setHours(endObj.getHours() + 1);
                const endStr = `${endObj.getFullYear()}-${String(endObj.getMonth() + 1).padStart(2, '0')}-${String(endObj.getDate()).padStart(2, '0')}T${String(endObj.getHours()).padStart(2, '0')}:${String(endObj.getMinutes()).padStart(2, '0')}:00`;
                annotationData.end_datetime = endStr;
                annotationData.all_day = false;
            }

            try {
                let result;
                if (editingAnnotationId) {
                    result = await window.supabaseClient
                        .from('agenda_events')
                        .update(annotationData)
                        .eq('id', editingAnnotationId)
                        .select();
                } else {
                    result = await window.supabaseClient
                        .from('agenda_events')
                        .insert([annotationData])
                        .select();
                }

                const { data, error } = result;
                if (error) throw error;

                console.log(editingAnnotationId ? '✓ Annotation modifiée' : '✓ Annotation enregistrée');
                await loadAnnotations();
                
                if (currentView === 'week') {
                    loadWeekView(selectedWeekStart);
                } else {
                    loadMonthView();
                }
                
                closeAnnotationModal();
            } catch (error) {
                console.error('Erreur lors de l\'enregistrement:', error);
                alert('Erreur: ' + (error.message || JSON.stringify(error)));
            }
        }

        function buildTrainingWeekGrid() {
            const monthNames = ['jan', 'fév', 'mar', 'avr', 'mai', 'jun', 'jul', 'aoû', 'sep', 'oct', 'nov', 'déc'];
            const dayNames = ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'];
            const ws = new Date(trainingWeekStart);
            const we = new Date(ws);
            we.setDate(we.getDate() + 6);

            document.getElementById('trainingWeekLabel').textContent =
                `${ws.getDate()} ${monthNames[ws.getMonth()]} - ${we.getDate()} ${monthNames[we.getMonth()]} ${we.getFullYear()}`;

            // Charger le type de semaine
            const currentWeekType = getWeekType(ws);
            document.querySelectorAll('input[name="weekType"]').forEach(r => r.checked = false);
            if (currentWeekType) {
                const radio = document.querySelector(`input[name="weekType"][value="${currentWeekType}"]`);
                if (radio) radio.checked = true;
            }

            const grid = document.getElementById('trainingWeekGrid');
            grid.innerHTML = '';

            for (let i = 0; i < 7; i++) {
                const day = new Date(ws);
                day.setDate(day.getDate() + i);
                const dateStr = `${day.getFullYear()}-${String(day.getMonth() + 1).padStart(2, '0')}-${String(day.getDate()).padStart(2, '0')}`;

                const dayActivities = getActivitiesForDate(day);
                // Chercher entraînement planifié (sans activité liée)
                const existingPlanned = trainings.find(t => t.date === dateStr && !t.strava_activity_id);
                // Chercher entraînements liés à des activités
                const existingLinked = trainings.filter(t => t.date === dateStr && t.strava_activity_id);

                if (dayActivities.length > 0) {
                    // Jour avec activité(s) : afficher une ligne par activité avec sélecteur
                    dayActivities.forEach((activity, actIdx) => {
                        const linkedTraining = existingLinked.find(t => t.strava_activity_id === activity.strava_id);
                        const dist = (activity.distance / 1000).toFixed(1);
                        const icon = sportIcon(activity.sport_type);
                        const time = new Date(activity.start_date_local).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

                        const row = document.createElement('div');
                        row.className = 'training-week-row';
                        row.dataset.activityId = activity.strava_id;
                        row.dataset.date = dateStr;
                        row.innerHTML = `
                            <span class="training-week-day">${actIdx === 0 ? dayNames[i] : ''}</span>
                            <span style="font-size: 11px; color: #333; min-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${icon} ${dist}km (${time})</span>
                            <input type="text" class="training-week-seance" placeholder="Séance..."
                                value="${linkedTraining && linkedTraining.title ? linkedTraining.title : ''}" data-date="${dateStr}" />
                        `;
                        grid.appendChild(row);
                    });

                    // Ajouter aussi une ligne planifiée si il y en a une (sans activité liée)
                    if (existingPlanned) {
                        const row = document.createElement('div');
                        row.className = 'training-week-row';
                        row.innerHTML = `
                            <span class="training-week-day"></span>
                            <select class="training-week-sport" data-date="${dateStr}">
                                <option value="">-</option>
                                <option value="Run" ${existingPlanned.sport_type === 'Run' ? 'selected' : ''}>🏃</option>
                                <option value="Ride" ${existingPlanned.sport_type === 'Ride' ? 'selected' : ''}>🚴</option>
                                <option value="NordicSki" ${existingPlanned.sport_type === 'NordicSki' ? 'selected' : ''}>⛷️</option>
                            </select>
                            <input type="number" class="training-week-km" placeholder="km" step="0.1" min="0"
                                value="${existingPlanned.planned_distance || ''}" data-date="${dateStr}" />
                            <input type="number" class="training-week-time" placeholder="min" step="1" min="0"
                                value="${existingPlanned.planned_time || ''}" data-date="${dateStr}" />
                            <input type="text" class="training-week-seance" placeholder="Séance..."
                                value="${existingPlanned.title || ''}" data-date="${dateStr}" />
                        `;
                        grid.appendChild(row);
                    }
                } else {
                    // Jour sans activité : ligne planification classique
                    const existing = existingPlanned;
                    const row = document.createElement('div');
                    row.className = 'training-week-row';
                    row.innerHTML = `
                        <span class="training-week-day">${dayNames[i]}</span>
                        <select class="training-week-sport" data-date="${dateStr}">
                            <option value="">-</option>
                            <option value="Run" ${existing && existing.sport_type === 'Run' ? 'selected' : ''}>🏃</option>
                            <option value="Ride" ${existing && existing.sport_type === 'Ride' ? 'selected' : ''}>🚴</option>
                            <option value="NordicSki" ${existing && existing.sport_type === 'NordicSki' ? 'selected' : ''}>⛷️</option>
                        </select>
                        <input type="number" class="training-week-km" placeholder="km" step="0.1" min="0"
                            value="${existing && existing.planned_distance ? existing.planned_distance : ''}" data-date="${dateStr}" />
                        <input type="number" class="training-week-time" placeholder="min" step="1" min="0"
                            value="${existing && existing.planned_time ? existing.planned_time : ''}" data-date="${dateStr}" />
                        <input type="text" class="training-week-seance" placeholder="Séance..."
                            value="${existing && existing.title ? existing.title : ''}" data-date="${dateStr}" />
                    `;
                    grid.appendChild(row);
                }
            }
        }

        // Planning multi-semaines
        const planningWeekTypes = {}; // weekStartStr -> type

        function openPlanningModal() {
            const monthNames = ['jan', 'fév', 'mar', 'avr', 'mai', 'jun', 'jul', 'aoû', 'sep', 'oct', 'nov', 'déc'];
            const list = document.getElementById('planningWeeksList');
            list.innerHTML = '';

            // Afficher les semaines de maintenant à 6 mois en avant
            const now = new Date();
            const start = new Date(now);
            const dayOfWeek = start.getDay();
            start.setDate(start.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));

            const end = new Date(now);
            end.setMonth(end.getMonth() + 6);

            const week = new Date(start);
            while (week <= end) {
                const ws = new Date(week);
                const we = new Date(ws);
                we.setDate(we.getDate() + 6);
                const wsStr = `${ws.getFullYear()}-${String(ws.getMonth() + 1).padStart(2, '0')}-${String(ws.getDate()).padStart(2, '0')}`;
                const label = `${ws.getDate()} ${monthNames[ws.getMonth()]} - ${we.getDate()} ${monthNames[we.getMonth()]}`;
                const currentType = getWeekType(ws) || '';

                const isCurrentWeek = now >= ws && now <= we;
                const row = document.createElement('div');
                row.className = 'planning-week-row';
                row.dataset.weekStart = wsStr;
                row.innerHTML = `
                    <span class="planning-week-label" style="${isCurrentWeek ? 'font-weight:700;color:#1e88e5;' : ''}">${label}${isCurrentWeek ? ' ●' : ''}</span>
                    <div class="planning-week-btns">
                        <button class="planning-type-btn ${currentType === 'bloc' ? 'active-bloc' : ''}" data-type="bloc" onclick="togglePlanningType(this, '${wsStr}', 'bloc')">Bloc</button>
                        <button class="planning-type-btn ${currentType === 'recuperation' ? 'active-recuperation' : ''}" data-type="recuperation" onclick="togglePlanningType(this, '${wsStr}', 'recuperation')">Récup</button>
                        <button class="planning-type-btn ${currentType === 'course' ? 'active-course' : ''}" data-type="course" onclick="togglePlanningType(this, '${wsStr}', 'course')">Course</button>
                    </div>
                `;
                list.appendChild(row);

                // Scroller jusqu'à la semaine actuelle
                if (isCurrentWeek) {
                    setTimeout(() => row.scrollIntoView({ block: 'center' }), 50);
                }

                week.setDate(week.getDate() + 7);
            }

            document.getElementById('planningModal').classList.add('show');
        }

        function togglePlanningType(btn, weekStartStr, type) {
            const row = btn.closest('.planning-week-row');
            const allBtns = row.querySelectorAll('.planning-type-btn');
            const isActive = btn.classList.contains('active-' + type);

            // Désactiver tous les boutons de la ligne
            allBtns.forEach(b => {
                b.className = 'planning-type-btn';
            });

            if (!isActive) {
                btn.classList.add('active-' + type);
                planningWeekTypes[weekStartStr] = type;
            } else {
                // Désactiver = supprimer le type
                planningWeekTypes[weekStartStr] = null;
            }
        }

        async function saveTraining() {
            // Mode édition simple
            if (editingTrainingId) {
                const date = document.getElementById('trainingDate').value;
                const text = document.getElementById('trainingText').value.trim();
                const kmVal = document.getElementById('trainingKm').value;
                const timeVal = document.getElementById('trainingTime').value;
                const sportVal = document.getElementById('trainingSport').value;

                const dateObj = new Date(date + 'T00:00:00');
                const dayActivities = getActivitiesForDate(dateObj);
                let activityId = null;
                if (dayActivities.length === 1) activityId = dayActivities[0].strava_id;
                else if (dayActivities.length > 1) activityId = parseInt(document.getElementById('trainingActivity').value);

                const trainingData = {
                    user_id: window.currentUserId,
                    date, title: text, strava_activity_id: activityId,
                    planned_distance: kmVal ? parseFloat(kmVal) : null,
                    planned_time: timeVal ? parseInt(timeVal) : null,
                    sport_type: activityId ? null : sportVal
                };

                try {
                    const { error } = await window.supabaseClient
                        .from('trainings').update(trainingData).eq('id', editingTrainingId);
                    if (error) throw error;
                } catch (error) {
                    alert('Erreur: ' + (error.message || JSON.stringify(error)));
                    return;
                }
            } else {
                // Mode semaine : sauvegarder toutes les lignes remplies
                const rows = document.querySelectorAll('.training-week-row');

                for (const row of rows) {
                    const activityId = row.dataset.activityId ? parseInt(row.dataset.activityId) : null;

                    if (activityId) {
                        // Ligne liée à une activité : sauvegarder seulement la séance
                        const seance = row.querySelector('.training-week-seance').value.trim();
                        const dateStr = row.dataset.date;
                        const existingLinked = trainings.find(t => t.date === dateStr && t.strava_activity_id === activityId);

                        try {
                            if (existingLinked && !seance) {
                                // Supprimer si séance vidée
                                const { error } = await window.supabaseClient.from('trainings').delete().eq('id', existingLinked.id);
                                if (error) throw error;
                            } else if (seance) {
                                const data = {
                                    user_id: window.currentUserId,
                                    date: dateStr,
                                    title: seance,
                                    strava_activity_id: activityId,
                                    sport_type: null,
                                    planned_distance: null,
                                    planned_time: null
                                };
                                if (existingLinked) {
                                    const { error } = await window.supabaseClient.from('trainings').update(data).eq('id', existingLinked.id);
                                    if (error) throw error;
                                } else {
                                    const { error } = await window.supabaseClient.from('trainings').insert([data]);
                                    if (error) throw error;
                                }
                            }
                        } catch (error) {
                            console.error('Erreur save training (activité):', error);
                            alert('Erreur: ' + (error.message || JSON.stringify(error)));
                            return;
                        }
                    } else {
                        // Ligne planification classique (sans activité)
                        const sportEl = row.querySelector('.training-week-sport');
                        if (!sportEl) continue;
                        const sport = sportEl.value;
                        const km = row.querySelector('.training-week-km').value;
                        const time = row.querySelector('.training-week-time').value;
                        const seance = row.querySelector('.training-week-seance').value.trim();
                        const dateStr = sportEl.dataset.date;

                        const existing = trainings.find(t => t.date === dateStr && !t.strava_activity_id);
                        const hasData = sport || km || time || seance;

                        // Validation : si sport/km/temps renseigné, sport obligatoire + au moins km ou temps
                        if ((sport || km || time) && (!sport || (!km && !time))) {
                            const dayLabel = row.querySelector('.training-week-day').textContent;
                            alert(`${dayLabel} : sport obligatoire et au moins une distance ou un temps`);
                            row.style.outline = '2px solid #e53935';
                            setTimeout(() => row.style.outline = '', 2000);
                            return;
                        }

                        try {
                            if (existing && !hasData) {
                                const { error } = await window.supabaseClient.from('trainings').delete().eq('id', existing.id);
                                if (error) throw error;
                            } else if (hasData) {
                                const data = {
                                    user_id: window.currentUserId,
                                    date: dateStr,
                                    title: seance || null,
                                    sport_type: sport || null,
                                    planned_distance: km ? parseFloat(km) : null,
                                    planned_time: time ? parseInt(time) : null,
                                    strava_activity_id: null
                                };
                                if (existing) {
                                    const { error } = await window.supabaseClient.from('trainings').update(data).eq('id', existing.id);
                                    if (error) throw error;
                                } else {
                                    const { error } = await window.supabaseClient.from('trainings').insert([data]);
                                    if (error) throw error;
                                }
                            }
                        } catch (error) {
                            console.error('Erreur save training:', error);
                            alert('Erreur: ' + (error.message || JSON.stringify(error)));
                            return;
                        }
                    }
                }

                // Sauvegarder le type de semaine
                const weekTypeRadio = document.querySelector('input[name="weekType"]:checked');
                const weekType = weekTypeRadio ? weekTypeRadio.value : null;
                const ws = new Date(trainingWeekStart);
                const weekStartStr = `${ws.getFullYear()}-${String(ws.getMonth() + 1).padStart(2, '0')}-${String(ws.getDate()).padStart(2, '0')}`;
                const existingWeek = trainingWeeks.find(w => w.week_start === weekStartStr);

                try {
                    if (weekType) {
                        if (existingWeek) {
                            const { error } = await window.supabaseClient
                                .from('training_weeks').update({ week_type: weekType }).eq('id', existingWeek.id);
                            if (error) throw error;
                        } else {
                            const { error } = await window.supabaseClient
                                .from('training_weeks').insert([{ user_id: window.currentUserId, week_start: weekStartStr, week_type: weekType }]);
                            if (error) throw error;
                        }
                    } else if (existingWeek) {
                        const { error } = await window.supabaseClient
                            .from('training_weeks').delete().eq('id', existingWeek.id);
                        if (error) throw error;
                    }
                } catch (error) {
                    console.error('Erreur save week type:', error);
                    alert('Erreur type semaine: ' + (error.message || JSON.stringify(error)));
                }
            }

            await Promise.all([loadTrainings(), loadTrainingWeeks()]);
            if (currentView === 'week') loadWeekView(selectedWeekStart);
            else loadMonthView();
            closeTrainingModal();
        }

        async function loadTrainings() {
            try {
                const { data, error } = await window.supabaseClient
                    .from('trainings')
                    .select('*')
                    .order('date', { ascending: true });

                if (error) throw error;
                trainings = data || [];
                console.log(`✓ ${trainings.length} entrainements chargés`);
            } catch (error) {
                console.error('Erreur chargement entrainements:', error);
                trainings = [];
            }
        }

        async function loadTrainingWeeks() {
            try {
                const { data, error } = await window.supabaseClient
                    .from('training_weeks')
                    .select('*');

                if (error) throw error;
                trainingWeeks = data || [];
                console.log(`✓ ${trainingWeeks.length} semaines type chargées`);
            } catch (error) {
                console.error('Erreur chargement semaines type:', error);
                trainingWeeks = [];
            }
        }

        function getWeekType(weekStartDate) {
            const d = new Date(weekStartDate);
            d.setHours(0, 0, 0, 0);
            const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            const found = trainingWeeks.find(w => {
                const ws = w.week_start.substring(0, 10);
                return ws === dateStr;
            });
            if (trainingWeeks.length > 0) {
                console.log('getWeekType:', dateStr, '→', found ? found.week_type : 'null', '| DB weeks:', trainingWeeks.map(w => w.week_start.substring(0, 10)));
            }
            return found ? found.week_type : null;
        }

        function getTrainingForActivity(stravaId) {
            return trainings.find(t => t.strava_activity_id === stravaId);
        }

        function getTrainingsForDate(date) {
            const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
            return trainings.filter(t => t.date === dateStr);
        }

        function editTraining(training) {
            editingTrainingId = training.id;
            preselectedTrainingActivityId = training.strava_activity_id;

            // Mode édition simple
            document.getElementById('trainingWeekNav').style.display = 'none';
            document.getElementById('trainingWeekType').style.display = 'none';
            document.getElementById('trainingWeekGrid').style.display = 'none';
            document.getElementById('trainingEditFields').style.display = '';
            document.getElementById('trainingModalHeader').textContent = 'Modifier l\'entrainement';
            document.getElementById('trainingSubmitBtn').textContent = 'Modifier';

            document.getElementById('trainingDate').value = training.date;
            document.getElementById('trainingText').value = training.title || '';
            document.getElementById('trainingKm').value = training.planned_distance || '';
            document.getElementById('trainingTime').value = training.planned_time || '';
            document.getElementById('trainingSport').value = training.sport_type || 'Run';
            updateTrainingActivitySelector();

            document.getElementById('trainingModal').classList.add('show');
        }

        async function deleteTraining(id) {
            try {
                const { error } = await window.supabaseClient
                    .from('trainings')
                    .delete()
                    .eq('id', id);

                if (error) throw error;
                console.log('✓ Entrainement supprimé');
                await loadTrainings();

                if (currentView === 'week') {
                    loadWeekView(selectedWeekStart);
                } else {
                    loadMonthView();
                }
            } catch (error) {
                console.error('Erreur suppression entrainement:', error);
            }
        }

        // === INITIALISATION ===
        async function initializeApp() {
            console.log('=== INITIALISATION DE L\'APPLICATION ===');

            try {
                // Auth check
                await requireAuth();
                console.log('✓ Authentifie:', window.currentUserEmail);

                // Handle Strava OAuth callback
                const urlParams = new URLSearchParams(window.location.search);
                const stravaCode = urlParams.get('code');
                if (stravaCode) {
                    console.log('OAuth callback Strava detecte...');
                    await handleStravaCallback(stravaCode);
                    window.history.replaceState({}, document.title, window.location.pathname);
                    console.log('✓ Strava connecte');
                }

                // Check Strava connection status
                const stravaTokens = await getUserStravaTokens();
                window.stravaConnected = !!stravaTokens;

                console.log('1. Chargement du cache...');
                loadCacheFromStorage();
                
                console.log('2. Chargement des annotations et entrainements...');
                await Promise.all([loadAnnotations(), loadTrainings(), loadTrainingWeeks()]);

                console.log('3. Chargement des activités...');
                const { data: activitiesData, error: activitiesError } = await window.supabaseClient
                    .from('strava_activities')
                    .select('*')
                    .gte('start_date_local', '2026-01-01')
                    .lte('start_date_local', '2026-12-31')
                    .order('start_date_local', { ascending: false });
                if (activitiesError) throw activitiesError;
                activities = activitiesData;
                console.log(`✓ ${activities.length} activités chargées`);

                console.log('4. Affichage de la vue mois...');
                showMonthView();
                
                console.log('=== APPLICATION INITIALISÉE ===');
            } catch (error) {
                console.error('❌ ERREUR lors de l\'initialisation:', error);
                const errorDiv = document.getElementById('monthCalendar');
                errorDiv.textContent = '';
                const noData = document.createElement('div');
                noData.className = 'no-data';
                noData.textContent = 'Erreur de chargement: ' + error.message;
                errorDiv.appendChild(noData);
            }
        }

        // === SYNC STRAVA ===
        async function syncStrava() {
            if (!window.stravaConnected) {
                connectStrava();
                return;
            }

            console.log('Sync en cours...');

            try {
                const token = await getStravaAccessToken();

                // Fetch recent activities (last 10 days)
                const after = Math.floor((Date.now() - 10 * 24 * 3600 * 1000) / 1000);
                const activitiesRes = await fetch(
                    `https://www.strava.com/api/v3/athlete/activities?per_page=200&after=${after}`,
                    { headers: { 'Authorization': `Bearer ${token}` } }
                );
                const stravaActivities = await activitiesRes.json();
                console.log(`Strava: ${stravaActivities.length} activites recentes`);

                // Upsert into Supabase
                let synced = 0;
                for (const a of stravaActivities) {
                    const row = {
                        user_id: window.currentUserId,
                        strava_id: a.id,
                        name: a.name,
                        sport_type: a.sport_type || a.type,
                        distance: a.distance,
                        moving_time: a.moving_time,
                        elapsed_time: a.elapsed_time,
                        total_elevation_gain: a.total_elevation_gain,
                        start_date: a.start_date,
                        start_date_local: a.start_date_local,
                        average_speed: a.average_speed,
                        max_speed: a.max_speed,
                        average_heartrate: a.average_heartrate,
                        max_heartrate: a.max_heartrate,
                        elev_high: a.elev_high,
                        elev_low: a.elev_low,
                        kudos_count: a.kudos_count || 0,
                        achievement_count: a.achievement_count || 0
                    };
                    const { error } = await window.supabaseClient
                        .from('strava_activities')
                        .upsert(row, { onConflict: 'user_id,strava_id' });
                    if (!error) synced++;
                }

                btn.textContent = `✓ ${synced} sync`;
                console.log(`Supabase: ${synced} activites synchronisees`);

                setTimeout(() => window.location.reload(), 1000);

            } catch (error) {
                console.error('Erreur sync:', error);
                if (error.message.includes('non connecte')) {
                    connectStrava();
                    return;
                }
                alert('Erreur sync: ' + error.message);
            }
        }

        // === LAZY-LOAD STREAMS DEPUIS STRAVA API ===
        async function fetchStreamsFromStrava(stravaId) {
            try {
                const token = await getStravaAccessToken();
                const streamTypes = 'latlng,altitude,time,distance,heartrate,velocity_smooth,grade_smooth,cadence,watts,temp';
                const res = await fetch(
                    `https://www.strava.com/api/v3/activities/${stravaId}/streams?keys=${streamTypes}&key_by_type=true`,
                    { headers: { 'Authorization': `Bearer ${token}` } }
                );
                if (res.status === 404) return [];
                if (!res.ok) throw new Error(`Strava API error: ${res.status}`);
                const data = await res.json();

                if (!data.latlng || !data.latlng.data) return [];

                const latlng = data.latlng.data;
                const altitude = data.altitude?.data || [];
                const time = data.time?.data || [];
                const distance = data.distance?.data || [];
                const heartrate = data.heartrate?.data || [];
                const velocity = data.velocity_smooth?.data || [];
                const grade = data.grade_smooth?.data || [];
                const cadence = data.cadence?.data || [];
                const watts = data.watts?.data || [];
                const temp = data.temp?.data || [];

                const points = latlng.map((ll, i) => ({
                    user_id: window.currentUserId,
                    strava_id: stravaId,
                    stream_index: i,
                    latitude: ll[0],
                    longitude: ll[1],
                    altitude: altitude[i] ?? null,
                    time: time[i] ?? null,
                    distance: distance[i] ?? null,
                    heartrate: heartrate[i] ?? null,
                    velocity_smooth: velocity[i] ?? null,
                    grade_smooth: grade[i] ?? null,
                    cadence: cadence[i] ?? null,
                    watts: watts[i] ?? null,
                    temp: temp[i] ?? null
                }));

                // Save to Supabase in batches
                for (let i = 0; i < points.length; i += 500) {
                    const batch = points.slice(i, i + 500);
                    await window.supabaseClient
                        .from('strava_activity_streams')
                        .upsert(batch, { onConflict: 'user_id,strava_id,stream_index' });
                }

                return points;
            } catch (error) {
                console.warn('Could not fetch streams from Strava:', error);
                return [];
            }
        }

        // === LAZY-LOAD LAPS DEPUIS STRAVA API ===
        async function fetchLapsFromStrava(stravaId) {
            try {
                const token = await getStravaAccessToken();
                const res = await fetch(
                    `https://www.strava.com/api/v3/activities/${stravaId}/laps`,
                    { headers: { 'Authorization': `Bearer ${token}` } }
                );
                if (!res.ok) return [];
                const laps = await res.json();

                const formatted = laps.map(lap => ({
                    user_id: window.currentUserId,
                    lap_id: lap.id,
                    activity_id: stravaId,
                    name: lap.name || '',
                    lap_index: lap.lap_index || 0,
                    distance: lap.distance || 0,
                    moving_time: lap.moving_time || 0,
                    elapsed_time: lap.elapsed_time || 0,
                    total_elevation_gain: lap.total_elevation_gain || 0,
                    start_date: lap.start_date,
                    start_date_local: lap.start_date_local,
                    average_speed: lap.average_speed,
                    max_speed: lap.max_speed,
                    average_heartrate: lap.average_heartrate,
                    max_heartrate: lap.max_heartrate,
                    average_cadence: lap.average_cadence,
                    pace_zone: lap.pace_zone,
                    start_index: lap.start_index,
                    end_index: lap.end_index
                }));

                for (const lapData of formatted) {
                    await window.supabaseClient
                        .from('strava_laps')
                        .upsert(lapData, { onConflict: 'user_id,lap_id' });
                }

                return formatted;
            } catch (error) {
                console.warn('Could not fetch laps from Strava:', error);
                return [];
            }
        }

        // Lancer l'initialisation au chargement de la page
        document.addEventListener('DOMContentLoaded', () => {
            initializeApp();
        });
    </script>
