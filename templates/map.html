<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte des Points de Livraison</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        #map {
            width: 100vw;
            height: 100vh;
        }


        /* Panneau titre */
        .info-panel {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 14px 18px;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            font-size: 13px;
            max-width: 260px;
        }
        .info-panel h4 {
            margin: 0 0 4px 0;
            font-size: 16px;
            font-weight: 700;
            color: #1a1a2e;
        }
        .info-panel p {
            margin: 0;
            color: #666;
            font-size: 12px;
        }

        /* Legende */
        .legend {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            line-height: 1.6;
            font-size: 12px;
        }
        .legend h4 {
            margin: 0 0 8px 0;
            font-size: 13px;
            font-weight: 700;
            color: #1a1a2e;
        }
        .legend-item {
            margin: 4px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: #444;
        }
        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
            border: 2px solid rgba(0,0,0,0.15);
            flex-shrink: 0;
        }

        /* Tooltip au survol */
        .leaflet-tooltip.custom-tooltip {
            background: rgba(26,26,46,0.92);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: 600;
            box-shadow: 0 3px 10px rgba(0,0,0,0.25);
            white-space: nowrap;
        }
        .leaflet-tooltip.custom-tooltip::before {
            border-top-color: rgba(26,26,46,0.92);
        }

        /* Popup */
        .popup-content {
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-width: 230px;
        }
        .popup-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e8eaf0;
        }
        .popup-header h3 {
            margin: 0;
            color: #1a1a2e;
            font-size: 15px;
            font-weight: 700;
        }
        .popup-header .badge {
            background: #e8eaf0;
            color: #555;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }
        .popup-content .pdl-name {
            font-size: 11px;
            color: #888;
            margin-bottom: 10px;
            font-weight: 500;
        }
        .popup-content table {
            width: 100%;
            border-collapse: collapse;
        }
        .popup-content tr:last-child td {
            border-bottom: none;
        }
        .popup-content td {
            padding: 5px 6px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 12px;
        }
        .popup-content td:first-child {
            font-weight: 600;
            color: #888;
            width: 35%;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .popup-total {
            margin-top: 10px;
            padding-top: 8px;
            border-top: 2px solid #e8eaf0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .popup-total span:first-child {
            font-size: 12px;
            color: #888;
            font-weight: 600;
            text-transform: uppercase;
        }
        .popup-total span:last-child {
            font-size: 18px;
            color: #1a1a2e;
            font-weight: 800;
        }
        .value-bar {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .value-bar span {
            min-width: 18px;
            font-weight: 700;
            color: #1a1a2e;
            font-size: 13px;
        }
        .mini-bar {
            height: 6px;
            border-radius: 3px;
            background: #e8eaf0;
            flex: 1;
            min-width: 50px;
            overflow: hidden;
        }
        .mini-bar-fill {
            height: 100%;
            border-radius: 3px;
        }

        /* Label a cote de chaque point */
        .point-label {
            background: rgba(255,255,255,0.92);
            border: none;
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 10px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            white-space: nowrap;
            color: #1a1a2e;
            line-height: 1.4;
        }
        .point-label .pl-name {
            font-weight: 700;
            font-size: 10px;
        }
        .point-label .pl-data {
            font-size: 9px;
            color: #555;
        }
        .point-label .pl-val {
            font-weight: 700;
            color: #1a1a2e;
        }

        /* Barre de recherche */
        .search-control {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .search-control input {
            border: none;
            outline: none;
            padding: 10px 14px;
            font-size: 13px;
            width: 220px;
            font-family: inherit;
            background: transparent;
        }
        .search-control input::placeholder {
            color: #aaa;
        }

        /* Legende en ligne */
        .legend-inline h4 {
            margin: 0 0 4px 0;
            font-size: 12px;
        }
        .legend-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* Bouton imprimer */
        .print-btn {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            padding: 8px 14px;
            font-size: 13px;
            font-family: inherit;
            font-weight: 600;
            color: #1a1a2e;
            cursor: pointer;
        }
        .print-btn:hover {
            background: #e8eaf0;
        }

        /* Impression */
        @media print {
            body { margin: 0; }
            #map { width: 100vw; height: 100vh; }
            .search-control, .print-btn, .leaflet-control-zoom { display: none !important; }
            .info-panel, .legend { background: white !important; box-shadow: none !important; border: 1px solid #ddd; }
        }
    </style>
</head>

        const maxVal = 25;

        // Carte
        const map = L.map('map', { zoomControl: false }).setView([46.603354, 2.3], 6);
        L.control.zoom({ position: 'topright' }).addTo(map);

        // Fond CartoDB Voyager (plus clair et lisible)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        // Couleurs U4
        function getColorU4(value) {
            if (value === 0) return '#b0bec5';
            if (value <= 5) return '#42a5f5';
            if (value <= 10) return '#66bb6a';
            if (value <= 15) return '#ffa726';
            return '#ef5350';
        }

        function getBarColor(value) {
            if (value === 0) return '#b0bec5';
            if (value <= 5) return '#42a5f5';
            if (value <= 10) return '#66bb6a';
            if (value <= 15) return '#ffa726';
            return '#ef5350';
        }

        // Taille fixe pour tous les points
        const MARKER_SIZE = 10;

        pointsData.forEach(point => {
            const color = getColorU4(point.u4);
            const size = MARKER_SIZE;
            const total = point.u4 + point.u8a + point.u8b + point.xpo_m;

            const circle = L.circleMarker([point.lat, point.lon], {
                radius: size,
                fillColor: color,
                color: '#fff',
                weight: 2.5,
                opacity: 1,
                fillOpacity: 0.85
            });

            // Tooltip au survol
            circle.bindTooltip(
                `<strong>${point.pdl}</strong><br>${point.ville} (${point.code_postal})`,
                { className: 'custom-tooltip', direction: 'top', offset: [0, -size] }
            );

            // Popup au clic
            const popupContent = `
                <div class="popup-content">
                    <div class="popup-header">
                        <h3>${point.ville}</h3>
                        <span class="badge">${point.code_postal}</span>
                    </div>
                    <div class="pdl-name">${point.pdl}</div>
                    <table>
                        <tr>
                            <td>U4</td>
                            <td><div class="value-bar"><span>${point.u4}</span><div class="mini-bar"><div class="mini-bar-fill" style="width:${Math.min(point.u4/maxVal*100,100)}%;background:${getBarColor(point.u4)}"></div></div></div></td>
                        </tr>
                        <tr>
                            <td>U8A</td>
                            <td><div class="value-bar"><span>${point.u8a}</span><div class="mini-bar"><div class="mini-bar-fill" style="width:${Math.min(point.u8a/maxVal*100,100)}%;background:${getBarColor(point.u8a)}"></div></div></div></td>
                        </tr>
                        <tr>
                            <td>U8B</td>
                            <td><div class="value-bar"><span>${point.u8b}</span><div class="mini-bar"><div class="mini-bar-fill" style="width:${Math.min(point.u8b/maxVal*100,100)}%;background:${getBarColor(point.u8b)}"></div></div></div></td>
                        </tr>
                        <tr>
                            <td>XPO M</td>
                            <td><div class="value-bar"><span>${point.xpo_m}</span><div class="mini-bar"><div class="mini-bar-fill" style="width:${Math.min(point.xpo_m/maxVal*100,100)}%;background:${getBarColor(point.xpo_m)}"></div></div></div></td>
                        </tr>
                    </table>
                    <div class="popup-total">
                        <span>Total</span>
                        <span>${total}</span>
                    </div>
                </div>
            `;

            circle.bindPopup(popupContent, { maxWidth: 280 });

            // Effet de survol
            circle.on('mouseover', function() {
                this.setStyle({ weight: 3.5, color: '#1a1a2e', fillOpacity: 1 });
            });
            circle.on('mouseout', function() {
                this.setStyle({ weight: 2.5, color: '#fff', fillOpacity: 0.85 });
            });

            circle.addTo(map);

            // Label avec nom + 2 data juste a cote du point
            L.marker([point.lat, point.lon], {
                icon: L.divIcon({
                    className: 'point-label',
                    html: `<div class="pl-name">${point.code_postal}</div><div class="pl-data">U4:<span class="pl-val">${point.u4}</span> U8A:<span class="pl-val">${point.u8a}</span> U8B:<span class="pl-val">${point.u8b}</span> XPO:<span class="pl-val">${point.xpo_m}</span></div>`,
                    iconSize: null,
                    iconAnchor: [-size - 4, 16]
                }),
                interactive: false
            }).addTo(map);
        });

        // Recherche
        const searchControl = L.control({ position: 'topleft' });
        searchControl.onAdd = function() {
            const div = L.DomUtil.create('div', 'search-control');
            div.innerHTML = '<input type="text" id="searchInput" placeholder="Rechercher ville ou PDL...">';
            L.DomEvent.disableClickPropagation(div);
            return div;
        };
        searchControl.addTo(map);

        setTimeout(function() {
            const input = document.getElementById('searchInput');
            if (!input) return;
            input.addEventListener('input', function() {
                const query = this.value.toLowerCase().trim();
                if (query.length < 2) return;
                const match = pointsData.find(p =>
                    p.ville.toLowerCase().includes(query) || p.pdl.toLowerCase().includes(query)
                );
                if (match) map.setView([match.lat, match.lon], 10);
            });
        }, 100);

        // Titre
        const info = L.control({ position: 'topleft' });
        info.onAdd = function() {
            const div = L.DomUtil.create('div', 'info-panel');
            div.innerHTML = `
                <h4>Carte des Points de Livraison</h4>
                <p>${pointsData.length} points &middot; Survolez ou cliquez pour les details</p>
            `;
            return div;
        };
        info.addTo(map);

        // Legende U4 juste a cote du titre (topleft)
        const legendU4 = L.control({ position: 'topleft' });
        legendU4.onAdd = function() {
            const div = L.DomUtil.create('div', 'legend legend-inline');
            div.innerHTML = `
                <h4>U4</h4>
                <div class="legend-row">
                    <div class="legend-item"><span class="legend-color" style="background:#b0bec5;"></span><span>0</span></div>

                    <div class="legend-item"><span class="legend-color" style="background:#66bb6a;"></span><span>6-10</span></div>
                    <div class="legend-item"><span class="legend-color" style="background:#ffa726;"></span><span>11-15</span></div>
                    <div class="legend-item"><span class="legend-color" style="background:#ef5350;"></span><span>16+</span></div>
                </div>
            `;
            return div;
        };
        legendU4.addTo(map);

        // Bouton imprimer
        const printControl = L.control({ position: 'topright' });
        printControl.onAdd = function() {
            const btn = L.DomUtil.create('button', 'print-btn');
            btn.innerHTML = 'Imprimer';
            btn.onclick = function(e) {
                e.stopPropagation();
                window.print();
            };
            L.DomEvent.disableClickPropagation(btn);
            return btn;
        };
        printControl.addTo(map);
    </script>
