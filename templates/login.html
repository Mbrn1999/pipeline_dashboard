<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e88e5 0%, #00acc1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 340px;
            width: 90%;
        }
        .login-box h2 { margin-bottom: 8px; color: #333; font-size: 22px; }
        .login-box p { color: #999; font-size: 13px; margin-bottom: 24px; }
        .login-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
            margin-bottom: 14px;
        }
        .login-box input:focus { outline: none; border-color: #1e88e5; }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1e88e5 0%, #00acc1 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .login-box button:hover { opacity: 0.9; }
        .login-error {
            color: #f44336;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }
        .login-links {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .login-links a {
            color: #1e88e5;
            text-decoration: none;
            font-size: 14px;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .login-links a:hover { background: #f5f5f5; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Strava Viewer</h2>
        <p>Entrez le mot de passe pour acceder au site</p>
        <form onsubmit="login(event)">
            <input type="password" id="password" placeholder="Mot de passe" autofocus />
            <button type="submit">Se connecter</button>
        </form>
        <div class="login-error" id="error">Mot de passe incorrect</div>
        <div class="login-links" id="links" style="display:none;">
            <a href="dashboard.html">Dashboard</a>
            <a href="gpx-creator.html">GPX Creator</a>
        </div>
    </div>

    <script>
        const PASSWORD_HASH = '75bbb6ee61baa4b453c32c2abd01ea91ae8dcf07988a736091493abd33409094';

        // Si deja connecte, afficher les liens
        if (sessionStorage.getItem('auth') === 'ok') {
            document.getElementById('links').style.display = 'flex';
            document.querySelector('form').style.display = 'none';
            document.querySelector('.login-box p').textContent = 'Vous etes connecte.';
        }

        async function sha256(text) {
            const data = new TextEncoder().encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function login(e) {
            e.preventDefault();
            const pwd = document.getElementById('password').value;
            const hash = await sha256(pwd);

            if (hash === PASSWORD_HASH) {
                sessionStorage.setItem('auth', 'ok');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('error').style.display = 'block';
                document.getElementById('password').value = '';
            }
        }
    </script>
</body>
</html>
